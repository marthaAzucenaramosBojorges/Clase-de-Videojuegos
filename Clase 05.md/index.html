<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sackboy VS IA</title>

<style>

body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}

canvas {
  display: block;
}


/* MARCADOR */

#marcador {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
  font-size: 24px;
  background: rgba(0, 0, 0, 0.5);
  padding: 10px 20px;
  border-radius: 8px;
  pointer-events: none;
  z-index: 5;
}


.buenas {
  color: #4CAF50;
  margin-right: 20px;
}


.malas {
  color: #F44336;
}


/* PANTALLA DE INICIO */

#inicio {

  position: absolute;

  top: 50%;
  left: 50%;

  transform: translate(-50%, -50%);

  color: white;

  text-align: center;

  background: rgba(0,0,0,0.75);

  padding: 40px;

  border-radius: 15px;

  z-index: 10;

}


#inicio h1 {

  font-size: 50px;

  margin-bottom: 20px;

}


#inicio p {

  font-size: 22px;

}


/* VIDAS */

#vidas-txt {

  font-size: 28px;

}


</style>

</head>


<body>


<!-- PANTALLA INICIAL -->

<div id="inicio">

  <h1>SACKBOY VS IA</h1>

  <p>Presiona ESPACIO para comenzar</p>

</div>



<!-- MARCADOR DEL JUEGO -->

<div id="marcador">


  <span class="buenas">
    Esquivados:
    <span id="buenas-txt">0</span>
  </span>


  <span class="malas">
    Impactos:
    <span id="malas-txt">0</span>
  </span>


  <br>


  <span>
    Vidas:
    <span id="vidas-txt">❤️❤️❤️</span>
  </span>


</div>



<script type="module" src="/src/main.js"></script>


</body>

</html>
